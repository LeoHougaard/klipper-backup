# Smooth front-to-rear first-layer correction. The Python extra is maintained
# in this repository under klipper_extras/y_axis_z_offset.py.

[save_variables]
filename: ~/printer_data/config/variables.cfg

[y_axis_z_offset]
y_min: 10
y_max: 110
max_abs_offset: 1.0
# Initial correction inferred from the 2026-07-11 full-bed first-layer test.
# Positive raises the nozzle; negative lowers it.
front_offset: 0.030
rear_offset: -0.030
front_variable: y_axis_z_offset_front
rear_variable: y_axis_z_offset_rear
calibrate_x: 60
horizontal_move_z: 5
calibrate_speed: 50

[gcode_macro CALIBRATE_BED_TILT]
description: Guided front/rear paper calibration for the two Z offsets
gcode:
    {% set probe_count = params.PROBE_COUNT|default(5)|int %}
    {% if probe_count < 3 or probe_count > 15 or probe_count % 2 == 0 %}
        {action_raise_error("PROBE_COUNT must be an odd number from 3 through 15")}
    {% endif %}
    {% if printer.print_stats.state in ['printing', 'paused'] %}
        {action_raise_error("Bed tilt calibration cannot run during a print")}
    {% endif %}
    {action_respond_info("Homing and generating a %dx%d compensated mesh before the front/rear paper tests." % (probe_count, probe_count))}
    BED_MESH_CLEAR
    G28
    BED_MESH_CALIBRATE PROBE_COUNT={probe_count},{probe_count}
    Y_AXIS_Z_OFFSET_CALIBRATE PROBE_COUNT={probe_count}

[gcode_macro CALIBRATE_COMPENSATED_BED_MESH]
description: Generate a selectable-detail heightmap with front/rear correction
gcode:
    {% set probe_count = params.PROBE_COUNT|default(5)|int %}
    {% if probe_count < 3 or probe_count > 15 or probe_count % 2 == 0 %}
        {action_raise_error("PROBE_COUNT must be an odd number from 3 through 15")}
    {% endif %}
    {% if printer.print_stats.state in ['printing', 'paused'] %}
        {action_raise_error("Bed mesh calibration cannot run during a print")}
    {% endif %}
    BED_MESH_CLEAR
    G28
    BED_MESH_CALIBRATE PROBE_COUNT={probe_count},{probe_count}

# Mainsail detects OFFSET as an input parameter when either advanced endpoint
# macro is selected. Regenerate the mesh after changing one directly.
[gcode_macro FRONT_Z_OFFSET]
description: Set front probe correction in mm; regenerate mesh afterward
gcode:
    {% if 'OFFSET' not in params %}
        {action_respond_info("Front Z offset is %.4f mm" % printer.y_axis_z_offset.front_offset)}
    {% else %}
        {% set offset = params.OFFSET|float %}
        {% if offset < -1.0 or offset > 1.0 %}
            {action_raise_error("Front Z offset must be between -1.0 and +1.0 mm")}
        {% endif %}
        SET_Y_AXIS_Z_OFFSET FRONT={offset}
        SAVE_VARIABLE VARIABLE=y_axis_z_offset_front VALUE={offset}
    {% endif %}

[gcode_macro REAR_Z_OFFSET]
description: Set rear probe correction in mm; regenerate mesh afterward
gcode:
    {% if 'OFFSET' not in params %}
        {action_respond_info("Rear Z offset is %.4f mm" % printer.y_axis_z_offset.rear_offset)}
    {% else %}
        {% set offset = params.OFFSET|float %}
        {% if offset < -1.0 or offset > 1.0 %}
            {action_raise_error("Rear Z offset must be between -1.0 and +1.0 mm")}
        {% endif %}
        SET_Y_AXIS_Z_OFFSET REAR={offset}
        SAVE_VARIABLE VARIABLE=y_axis_z_offset_rear VALUE={offset}
    {% endif %}
