# Adaptive rear-to-front purge for this 120 mm Voron V0.2 bed.
#
# The nozzle heats at the rear Y limit so passive ooze and the initial free-air
# prime fall behind the sheet. The deposited line is always parallel to Y. It
# starts wide to catch residue/build pressure, then tapers to a conventional
# first-layer width before the print begins.

[gcode_macro REAR_PURGE_PARK]
description: Park over the rear edge in the adaptive purge lane while heating
gcode:
    {% set settings = printer["gcode_macro _KAMP_Settings"] %}
    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}
    {% set start_width = settings.purge_start_width|float %}
    {% set edge_clearance = settings.purge_edge_clearance|float %}
    {% set lane_min = x_min + edge_clearance + (start_width / 2.0) %}
    {% set lane_max = x_max - edge_clearance - (start_width / 2.0) %}
    {% set purge_margin = settings.purge_margin|float %}
    {% set all_points = printer.exclude_object.objects|map(attribute='polygon')|sum(start=[]) %}

    {% if all_points|length > 0 %}
        {% set object_x_min = all_points|map(attribute=0)|min|float %}
        {% set object_x_max = all_points|map(attribute=0)|max|float %}
        {% set left_lane = object_x_min - purge_margin %}
        {% set right_lane = object_x_max + purge_margin %}
        {% if left_lane >= lane_min %}
            {% set purge_x = left_lane %}
        {% elif right_lane <= lane_max %}
            {% set purge_x = right_lane %}
        {% else %}
            {action_raise_error("No safe Y-axis purge lane beside the model. Reserve %.1f mm on either the left or right side." % (purge_margin + (start_width / 2.0)))}
        {% endif %}
    {% else %}
        {% set purge_x = lane_min %}
    {% endif %}

    G90
    G0 Z{settings.rear_park_height|float} F1200
    G0 X{purge_x} Y{y_max} F12000
    {action_respond_info("Rear heat park at X%.2f Y%.2f; ooze is directed behind the bed." % (purge_x, y_max))}

[gcode_macro LINE_PURGE]
description: Adaptive Y-axis purge that tapers from very wide to normal line width
gcode:
    {% set settings = printer["gcode_macro _KAMP_Settings"] %}
    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}
    {% set filament_diameter = printer.configfile.settings.extruder.filament_diameter|float %}
    {% set filament_area = 3.14159265 * (filament_diameter / 2.0) ** 2 %}
    {% set purge_height = settings.purge_height|float %}
    {% set start_width = settings.purge_start_width|float %}
    {% set end_width = settings.purge_end_width|float %}
    {% set purge_margin = settings.purge_margin|float %}
    {% set edge_clearance = settings.purge_edge_clearance|float %}
    {% set lane_min = x_min + edge_clearance + (start_width / 2.0) %}
    {% set lane_max = x_max - edge_clearance - (start_width / 2.0) %}
    {% set all_points = printer.exclude_object.objects|map(attribute='polygon')|sum(start=[]) %}

    {% if start_width < end_width or end_width < purge_height %}
        {action_raise_error("Tapered purge widths must end at or above purge height and start at or above end width.")}
    {% endif %}

    {% if all_points|length > 0 %}
        {% set object_x_min = all_points|map(attribute=0)|min|float %}
        {% set object_x_max = all_points|map(attribute=0)|max|float %}
        {% set object_y_min = all_points|map(attribute=1)|min|float %}
        {% set object_y_max = all_points|map(attribute=1)|max|float %}
        {% set object_y_center = (object_y_min + object_y_max) / 2.0 %}
        {% set left_lane = object_x_min - purge_margin %}
        {% set right_lane = object_x_max + purge_margin %}
        {% if left_lane >= lane_min %}
            {% set purge_x = left_lane %}
        {% elif right_lane <= lane_max %}
            {% set purge_x = right_lane %}
        {% else %}
            {action_raise_error("No safe Y-axis purge lane beside the model. Reserve %.1f mm on either the left or right side." % (purge_margin + (start_width / 2.0)))}
        {% endif %}
    {% else %}
        {% set purge_x = lane_min %}
        {% set object_y_center = (y_min + y_max) / 2.0 %}
    {% endif %}

    {% set available_length = y_max - y_min - (2.0 * edge_clearance) %}
    {% set line_length = [settings.purge_line_length|float, available_length]|min %}
    {% set earliest_start = y_min + edge_clearance + line_length %}
    {% set latest_start = y_max - edge_clearance %}
    {% set desired_start = object_y_center + (line_length / 2.0) %}
    {% set purge_y_start = [[desired_start, latest_start]|min, earliest_start]|max %}
    {% set segment_count = 6 %}
    {% set segment_length = line_length / segment_count %}
    {% set purge_speed = settings.purge_speed|float * 60.0 %}
    {% set rear_prime = settings.tip_distance|float + settings.rear_prime_amount|float %}
    {% set break_retract = 0.8 %}
    {% set break_x = purge_x + 5.0 if purge_x < ((x_min + x_max) / 2.0) else purge_x - 5.0 %}

    {action_respond_info("Tapered Y purge at X%.2f from Y%.2f to Y%.2f; width %.2f to %.2f mm." % (purge_x, purge_y_start, purge_y_start - line_length, start_width, end_width))}

    SAVE_GCODE_STATE NAME=TAPERED_PURGE_STATE
    G90
    M83
    G92 E0

    # Restore the 4 mm end-of-print retract and expel a small amount with the
    # nozzle over the rear edge. A short retract and sideways snap help release
    # the hanging strand before moving onto the sheet.
    G1 E{rear_prime} F300
    G1 E-{break_retract} F1800
    G0 X{break_x} F12000
    G0 X{purge_x} F12000

    G0 Y{purge_y_start} F12000
    G0 Z{purge_height} F1200

    # Six short segments approximate a continuous taper. Extrusion is derived
    # from rounded-rectangle line cross-section and the configured filament
    # diameter instead of treating filament millimetres as line millimetres.
    {% for segment in range(segment_count) %}
        {% set fraction = segment / (segment_count - 1) %}
        {% set width = start_width + ((end_width - start_width) * fraction) %}
        {% set line_area = (purge_height * (width - purge_height)) + (3.14159265 * (purge_height / 2.0) ** 2) %}
        {% set extrusion = (line_area * segment_length) / filament_area %}
        {% if segment == 0 %}
            {% set extrusion = extrusion + break_retract %}
        {% endif %}
        G1 Y{purge_y_start - ((segment + 1) * segment_length)} E{extrusion} F{purge_speed}
    {% endfor %}

    G1 E-0.5 F1800
    G0 X{break_x} F12000
    G0 Z{purge_height + 1.0} F1200
    G92 E0
    RESTORE_GCODE_STATE NAME=TAPERED_PURGE_STATE
