[include mainsail.cfg]
[include toolhead_btt_ebbcan_G0B1_v1.2.cfg]
[include KAMP_Settings.cfg]

#####################################################################
# Voron V0.2r1 - Formbot / BTT SKR Pico + BTT EBB36 CAN v1.2
# Rebuilt from recovered config and checked against the Voron V0.2r1
# SKR Pico reference configuration.
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_rp2040_504450593882C41C-if00
restart_method: command

[mcu CB1]
serial: /tmp/klipper_host_mcu

[mcu EBBCan]
canbus_uuid: e96d37dcef25

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor btt_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor CANBOARD]
sensor_type: temperature_mcu
sensor_mcu: EBBCan
min_temp: 0
max_temp: 100

[exclude_object]

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 2000
max_z_velocity: 15
max_z_accel: 300
square_corner_velocity: 6.0

#####################################################################
# X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: gpio11
dir_pin: gpio10
enable_pin: !gpio12
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 120
position_max: 120
homing_speed: 20
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 0
interpolate: False
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^gpio4
driver_SGTHRS: 55

[stepper_y]
step_pin: gpio6
dir_pin: gpio5
enable_pin: !gpio7
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 120
position_max: 120
homing_speed: 20
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 2
interpolate: False
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^gpio3
driver_SGTHRS: 65

#####################################################################
# Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: gpio19
dir_pin: !gpio28
enable_pin: !gpio2
rotation_distance: 8
microsteps: 32
endstop_pin: probe:z_virtual_endstop
position_max: 120
position_min: -1.5
homing_speed: 5
second_homing_speed: 2.5
homing_retract_dist: 2.0

[tmc2209 stepper_z]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 1
interpolate: False
run_current: 0.30
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
# Bed Heater
#####################################################################

[heater_bed]
heater_pin: gpio21
sensor_type: Generic 3950
sensor_pin: gpio26
smooth_time: 3.0
min_temp: 0
max_temp: 110
control: pid
# Measured at 60C (2026-07-11).
pid_kp: 56.449
pid_ki: 2.595
pid_kd: 306.941

#####################################################################
# Fan Control
#####################################################################

[controller_fan MCU_fan]
pin: gpio20
max_power: 1.0
kick_start_time: 0.5
heater: extruder
fan_speed: 0.75
idle_timeout: 900
idle_speed: 0.25

[fan_generic air_filter]
pin: gpio17
max_power: 1.0
kick_start_time: 0.5
cycle_time: 0.010
off_below: 0.05

[gcode_macro AIR_FILTER]
description: Set the chamber air filtration fan. Usage: AIR_FILTER SPEED=0.0-1.0
gcode:
    {% set speed = params.SPEED|default(1.0)|float %}
    SET_FAN_SPEED FAN=air_filter SPEED={speed}

[gcode_macro QUIET_MODE]
description: Reduce motion and fan noise
gcode:
    M220 S60
    SET_VELOCITY_LIMIT VELOCITY=150 ACCEL=1000 SQUARE_CORNER_VELOCITY=3
    M106 S90
    SET_FAN_SPEED FAN=air_filter SPEED=0.25
    RESPOND MSG="Quiet mode enabled: speed 60%, part fan ~35%, air filter 25%."

[gcode_macro NORMAL_MODE]
description: Restore normal motion and fan settings
gcode:
    M220 S100
    SET_VELOCITY_LIMIT VELOCITY=300 ACCEL=2000 SQUARE_CORNER_VELOCITY=6
    M106 S255
    SET_FAN_SPEED FAN=air_filter SPEED=1.0
    RESPOND MSG="Normal mode restored."

[gcode_macro M106]
rename_existing: M106.1
gcode:
    {% set fan = params.P|default(0)|int %}
    {% set speed = params.S|default(255)|float %}
    {% set normalized = (speed / 255.0)|round(3) %}
    {% if fan == 3 %}
        SET_FAN_SPEED FAN=air_filter SPEED={normalized}
    {% else %}
        M106.1 {rawparams}
    {% endif %}

[gcode_macro M107]
rename_existing: M107.1
gcode:
    {% set fan = params.P|default(0)|int %}
    {% if fan == 3 %}
        SET_FAN_SPEED FAN=air_filter SPEED=0
    {% else %}
        M107.1 {rawparams}
    {% endif %}

#####################################################################
# Homing and Bed Adjustment
#####################################################################

[idle_timeout]
timeout: 1800

[homing_override]
axes: xyz
set_position_z: 0
gcode:
    SAVE_GCODE_STATE NAME=STATE_HOME_OVERRIDE
    G90
    G0 Z5 F600
    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

    {% if home_all or 'X' in params %}
        _HOME_X
    {% endif %}

    {% if home_all or 'Y' in params %}
        _HOME_Y
    {% endif %}

    {% if home_all or 'Z' in params %}
        # A nozzle probe must home Z over the bed. If G28 Z was requested by
        # itself, establish X/Y first so the move to bed centre is safe.
        {% if not home_all and 'X' not in params and 'x' not in printer.toolhead.homed_axes %}
            _HOME_X
        {% endif %}
        {% if not home_all and 'Y' not in params and 'y' not in printer.toolhead.homed_axes %}
            _HOME_Y
        {% endif %}
        _HOME_Z
    {% endif %}

    RESTORE_GCODE_STATE NAME=STATE_HOME_OVERRIDE


[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 10,10
mesh_max: 110,110
probe_count: 5,5
algorithm: bicubic
zero_reference_position: 60,60

# Keep this after [bed_mesh]. The custom module adjusts probe results before
# Klipper builds meshes or calculates screw tilt.
[include y_axis_z_offset.cfg]

[bed_screws]
screw1: 60,5
screw1_name: front screw
screw2: 5,115
screw2_name: back left
screw3: 115,115
screw3_name: back right

[screws_tilt_adjust]
screw1: 60,5
screw1_name: front screw
screw2: 5,115
screw2_name: back left
screw3: 115,115
screw3_name: back right
speed: 100
horizontal_move_z: 5
screw_thread: CW-M3

[neopixel board_rgb]
pin: gpio24
chain_count: 1
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.1
initial_BLUE: 0.0

#####################################################################
# Macros
#####################################################################

[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED|default(params.BED_TEMP|default(60))|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(params.EXTRUDER_TEMP|default(200))|float %}
    SET_FAN_SPEED FAN=air_filter SPEED=1
    BED_MESH_CLEAR
    M140 S{BED_TEMP}
    M104 S150
    # Establish XY first and keep the warming nozzle over the rear bed edge.
    # Z is intentionally not touched until both heaters have stabilized.
    G28 X Y
    G90
    G0 X60 Y{printer.toolhead.axis_maximum.y|float} F6000
    M190 S{BED_TEMP}
    M109 S150
    G28 Z
    # Klipper's native adaptive mesh uses Moonraker's processed object data.
    # A fresh mesh is generated for every print and is not reused.
    BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=5
    REAR_PURGE_PARK
    M109 S{EXTRUDER_TEMP}
    LINE_PURGE
[gcode_macro PRINT_END]
gcode:
    M400
    G92 E0
    G1 E-4.0 F3600
    G91
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    {% if printer.toolhead.position.x < (max_x - 20) %}
        {% set x_safe = 20.0 %}
    {% else %}
        {% set x_safe = -20.0 %}
    {% endif %}
    {% if printer.toolhead.position.y < (max_y - 20) %}
        {% set y_safe = 20.0 %}
    {% else %}
        {% set y_safe = -20.0 %}
    {% endif %}
    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}
    G0 Z{z_safe} F3600
    G0 X{x_safe} Y{y_safe} F20000
    TURN_OFF_HEATERS
    M107
    SET_FAN_SPEED FAN=air_filter SPEED=0
    G90
    G0 X60 Y{max_y-10} F3600

[gcode_macro LOAD_FILAMENT]
gcode:
    M83
    G1 E30 F300
    G1 E15 F150
    M82

[gcode_macro UNLOAD_FILAMENT]
gcode:
    M83
    G1 E10 F300
    G1 E-40 F1800
    M82

[gcode_macro _HOME_X]
gcode:
    # Always use consistent run_current on A/B steppers during sensorless homing
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT = 0.55 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT * RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT * RUN_CURRENT_Y}
    G28 X
    G91
    G1 X-10 F1200
    G4 P1000
    G90
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro _HOME_Y]
gcode:
    # Always use consistent run_current on A/B steppers during sensorless homing
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT = 0.55 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT * RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT * RUN_CURRENT_Y}
    G28 Y
    G91
    G1 Y-10 F1200
    G4 P1000
    G90
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro _HOME_Z]
gcode:
    {% set EXTRUDER_TARGET = printer.extruder.target|float %}
    {% set EXTRUDER_TEMP = printer.extruder.temperature|float %}
    {% set FAN_SPEED = printer.fan.speed|float %}
    G90
    G1 X60 Y60 F6000
    # Mellow recommends probing at no more than 150C. This softens residue
    # without driving a fully hot, oozing nozzle into the build surface.
    {% if EXTRUDER_TARGET > 150 or EXTRUDER_TEMP > 150 %}
        M106 S255
        M109 S150
    {% endif %}
    G28 Z
    G1 Z10 F1200
    {% if EXTRUDER_TARGET > 150 %}
        M109 S{EXTRUDER_TARGET}
    {% else %}
        M104 S{EXTRUDER_TARGET}
    {% endif %}
    M106 S{(FAN_SPEED * 255)|int}

[input_shaper]
# Measured with the completed HeatCore 4 toolhead (2026-07-11).
shaper_type_x: mzv
shaper_freq_x: 62.2
shaper_type_y: 3hump_ei
shaper_freq_y: 86.6

[shaketune]
# result_folder: ~/printer_data/config/ShakeTune_results
# number_of_results_to_keep: 10
# keep_raw_data: False
show_macros_in_webui: True
