# KAMP-style adaptive purge followed by a standard-width conditioning stage.
#
# Placement follows KAMP's original preference: purge along X immediately in
# front of the object when that space exists, otherwise purge along Y beside
# it. The nozzle waits for final print temperature at the exact line origin and
# first-layer Z height so any ooze becomes part of the purge instead of hanging
# from the toolhead or falling outside the build plate.

[gcode_macro PURGE_LINE_HEAT_PARK]
description: Park at the adaptive KAMP purge origin and first-layer height for heating
gcode:
    {% set settings = printer["gcode_macro _KAMP_Settings"] %}
    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}
    {% set filament_diameter = printer.configfile.settings.extruder.filament_diameter|float %}
    {% set filament_area = 3.14159265 * (filament_diameter / 2.0) ** 2 %}
    {% set purge_height = settings.purge_height|float %}
    {% set kamp_amount = settings.purge_amount|float %}
    {% set line_length = kamp_amount + settings.purge_standard_length|float %}
    {% set edge_clearance = settings.purge_edge_clearance|float %}
    {% set purge_margin = settings.purge_margin|float %}
    {% set calculation_height = [purge_height, 0.001]|max %}
    {% set kamp_width = ((filament_area - (3.14159265 * (calculation_height / 2.0) ** 2)) / calculation_height) + calculation_height %}
    {% set footprint_clearance = edge_clearance + (kamp_width / 2.0) %}
    {% set lane_margin = [purge_margin, footprint_clearance]|max %}
    {% set x_safe_min = x_min + footprint_clearance %}
    {% set x_safe_max = x_max - footprint_clearance %}
    {% set y_safe_min = y_min + footprint_clearance %}
    {% set y_safe_max = y_max - footprint_clearance %}
    {% set all_points = printer.exclude_object.objects|map(attribute='polygon')|sum(start=[]) %}

    {% if purge_height <= 0.0 %}
        {action_raise_error("Two-stage purge height must be above Z=0 so the nozzle cannot contact the bed.")}
    {% endif %}

    {% if all_points|length > 0 %}
        {% set object_x_min = all_points|map(attribute=0)|min|float %}
        {% set object_x_max = all_points|map(attribute=0)|max|float %}
        {% set object_y_min = all_points|map(attribute=1)|min|float %}
        {% set object_y_max = all_points|map(attribute=1)|max|float %}
        {% set front_lane = object_y_min - lane_margin %}

        {% if front_lane >= y_safe_min %}
            # KAMP's preferred case: an X-axis purge in front of the object.
            {% if line_length > x_safe_max - x_safe_min %}
                {action_raise_error("The two-stage purge is too long for the X travel limits.")}
            {% endif %}
            {% set desired_start = ((object_x_min + object_x_max) / 2.0) - (line_length / 2.0) %}
            {% set purge_x = [[desired_start, x_safe_max - line_length]|min, x_safe_min]|max %}
            {% set purge_y = front_lane %}
            {% set purge_axis = "X" %}
        {% else %}
            # No front lane: reproduce KAMP's Y-axis fallback beside the object.
            {% set left_lane = object_x_min - lane_margin %}
            {% set right_lane = object_x_max + lane_margin %}
            {% if left_lane >= x_safe_min %}
                {% set purge_x = left_lane %}
            {% elif right_lane <= x_safe_max %}
                {% set purge_x = right_lane %}
            {% else %}
                {action_raise_error("No safe KAMP purge lane in front of or beside the model.")}
            {% endif %}
            {% if line_length > y_safe_max - y_safe_min %}
                {action_raise_error("The two-stage purge is too long for the Y travel limits.")}
            {% endif %}
            {% set desired_start = ((object_y_min + object_y_max) / 2.0) - (line_length / 2.0) %}
            {% set purge_y = [[desired_start, y_safe_max - line_length]|min, y_safe_min]|max %}
            {% set purge_axis = "Y" %}
        {% endif %}
    {% else %}
        # Deterministic front-edge fallback if Moonraker supplied no polygons.
        {% set purge_x = x_safe_min %}
        {% set purge_y = y_safe_min %}
        {% set purge_axis = "X" %}
    {% endif %}

    G90
    G0 Z{settings.purge_travel_height|float} F1200
    G0 X{purge_x} Y{purge_y} F12000
    G0 Z{purge_height} F1200
    {action_respond_info("Heating at KAMP purge origin X%.2f Y%.2f Z%.2f; %s-axis purge, estimated heavy-line width %.2f mm." % (purge_x, purge_y, purge_height, purge_axis, kamp_width))}

[gcode_macro LINE_PURGE]
description: Original-volume KAMP purge followed by a standard-width stage
gcode:
    {% set settings = printer["gcode_macro _KAMP_Settings"] %}
    {% set x_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}
    {% set filament_diameter = printer.configfile.settings.extruder.filament_diameter|float %}
    {% set filament_area = 3.14159265 * (filament_diameter / 2.0) ** 2 %}
    {% set purge_height = settings.purge_height|float %}
    {% set kamp_amount = settings.purge_amount|float %}
    {% set standard_width = settings.purge_standard_width|float %}
    {% set standard_length = settings.purge_standard_length|float %}
    {% set line_length = kamp_amount + standard_length %}
    {% set edge_clearance = settings.purge_edge_clearance|float %}
    {% set purge_margin = settings.purge_margin|float %}
    {% set calculation_height = [purge_height, 0.001]|max %}
    {% set kamp_width = ((filament_area - (3.14159265 * (calculation_height / 2.0) ** 2)) / calculation_height) + calculation_height %}
    {% set footprint_clearance = edge_clearance + (kamp_width / 2.0) %}
    {% set lane_margin = [purge_margin, footprint_clearance]|max %}
    {% set x_safe_min = x_min + footprint_clearance %}
    {% set x_safe_max = x_max - footprint_clearance %}
    {% set y_safe_min = y_min + footprint_clearance %}
    {% set y_safe_max = y_max - footprint_clearance %}
    {% set all_points = printer.exclude_object.objects|map(attribute='polygon')|sum(start=[]) %}

    {% if purge_height <= 0.0 %}
        {action_raise_error("Two-stage purge height must be above Z=0 so the nozzle cannot contact the bed.")}
    {% elif kamp_amount <= 0.0 or standard_length <= 0.0 %}
        {action_raise_error("Both two-stage purge lengths must be greater than zero.")}
    {% elif standard_width < purge_height %}
        {action_raise_error("The standard purge width must accommodate purge height.")}
    {% endif %}

    {% if all_points|length > 0 %}
        {% set object_x_min = all_points|map(attribute=0)|min|float %}
        {% set object_x_max = all_points|map(attribute=0)|max|float %}
        {% set object_y_min = all_points|map(attribute=1)|min|float %}
        {% set object_y_max = all_points|map(attribute=1)|max|float %}
        {% set front_lane = object_y_min - lane_margin %}

        {% if front_lane >= y_safe_min %}
            {% if line_length > x_safe_max - x_safe_min %}
                {action_raise_error("The two-stage purge is too long for the X travel limits.")}
            {% endif %}
            {% set desired_start = ((object_x_min + object_x_max) / 2.0) - (line_length / 2.0) %}
            {% set purge_x = [[desired_start, x_safe_max - line_length]|min, x_safe_min]|max %}
            {% set purge_y = front_lane %}
            {% set purge_axis = "X" %}
        {% else %}
            {% set left_lane = object_x_min - lane_margin %}
            {% set right_lane = object_x_max + lane_margin %}
            {% if left_lane >= x_safe_min %}
                {% set purge_x = left_lane %}
            {% elif right_lane <= x_safe_max %}
                {% set purge_x = right_lane %}
            {% else %}
                {action_raise_error("No safe KAMP purge lane in front of or beside the model.")}
            {% endif %}
            {% if line_length > y_safe_max - y_safe_min %}
                {action_raise_error("The two-stage purge is too long for the Y travel limits.")}
            {% endif %}
            {% set desired_start = ((object_y_min + object_y_max) / 2.0) - (line_length / 2.0) %}
            {% set purge_y = [[desired_start, y_safe_max - line_length]|min, y_safe_min]|max %}
            {% set purge_axis = "Y" %}
        {% endif %}
    {% else %}
        {% if line_length > x_safe_max - x_safe_min %}
            {action_raise_error("The two-stage purge is too long for the X travel limits.")}
        {% endif %}
        {% set purge_x = x_safe_min %}
        {% set purge_y = y_safe_min %}
        {% set purge_axis = "X" %}
    {% endif %}

    # Match KAMP's original purge speed calculation for its high-volume stage.
    {% set kamp_speed = (settings.flow_rate|float / 5.0) * 60.0 %}
    {% set standard_speed = settings.purge_standard_speed|float * 60.0 %}
    {% set standard_area = (purge_height * (standard_width - purge_height)) + (3.14159265 * (purge_height / 2.0) ** 2) %}
    {% set standard_extrusion = (standard_area * standard_length) / filament_area %}

    {action_respond_info("KAMP-style %s purge from X%.2f Y%.2f: %.1f mm travel with E%.1f (estimated %.2f mm wide), then %.1f mm at %.2f mm wide." % (purge_axis, purge_x, purge_y, kamp_amount, kamp_amount, kamp_width, standard_length, standard_width))}

    SAVE_GCODE_STATE NAME=TWO_STAGE_PURGE_STATE
    G90

    # PRINT_START already parked here at first-layer height for final heating.
    # Preserve that ooze in the beginning of the line. If invoked separately,
    # move to the origin at safe Z before lowering vertically in place.
    {% if (printer.toolhead.position.x - purge_x)|abs > 0.1 or (printer.toolhead.position.y - purge_y)|abs > 0.1 %}
        G0 Z{settings.purge_travel_height|float} F1200
        G0 X{purge_x} Y{purge_y} F12000
    {% endif %}
    G0 Z{purge_height} F1200

    M83
    G92 E0
    G1 E{settings.tip_distance|float} F300

    # Preserve KAMP's original purge semantics: purge_amount is both travel
    # length and filament millimetres. Follow it with a calculated normal-width
    # section to stabilize extrusion before the model starts.
    {% if purge_axis == "X" %}
        G1 X{purge_x + kamp_amount} E{kamp_amount} F{kamp_speed}
        G1 X{purge_x + line_length} E{standard_extrusion} F{standard_speed}
    {% else %}
        G1 Y{purge_y + kamp_amount} E{kamp_amount} F{kamp_speed}
        G1 Y{purge_y + line_length} E{standard_extrusion} F{standard_speed}
    {% endif %}

    G1 E-0.5 F1800
    {% if purge_axis == "X" %}
        {% set line_end = purge_x + line_length %}
        {% set break_position = line_end + 5.0 if line_end + 5.0 <= x_max else line_end - 5.0 %}
        G0 X{break_position} F12000
    {% else %}
        {% set line_end = purge_y + line_length %}
        {% set break_position = line_end + 5.0 if line_end + 5.0 <= y_max else line_end - 5.0 %}
        G0 Y{break_position} F12000
    {% endif %}
    G0 Z{purge_height + 1.0} F1200
    G92 E0
    RESTORE_GCODE_STATE NAME=TWO_STAGE_PURGE_STATE
